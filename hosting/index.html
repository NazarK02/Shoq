<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="i18n-title" content="pageTitle" />
    <title>Join Shoq Server</title>

    <!-- Preload i18n — must run before DOMContentLoaded fires -->
    <script src="../docs/shoq-i18n.js"></script>

    <style>
      :root {
        --bg:       #0d0d1a;
        --bg2:      #14142a;
        --border:   rgba(255,255,255,0.08);
        --text:     #e8e8f0;
        --muted:    #7a7a99;
        --accent:   #00c8ff;
        --green:    #00e5a0;
        --red:      #ff4d6d;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem 2rem 1.6rem;
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      /* ── Header ── */
      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.3;
      }

      #subtitle {
        font-size: 0.9rem;
        color: var(--muted);
        margin-top: 0.3rem;
      }

      /* ── Lang picker ── */
      #lang-picker {
        flex-shrink: 0;
        margin-top: 0.15rem;
      }

      /* ── Server preview ── */
      .server-card {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        padding: 0.9rem 1rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .server-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        object-fit: cover;
        background: var(--bg);
        flex-shrink: 0;
      }

      .server-name {
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 0.15rem;
      }

      .server-sub {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .server-desc {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 0.3rem;
        line-height: 1.45;
      }

      /* ── Invite code ── */
      .code-wrap {
        background: rgba(0,200,255,0.05);
        border: 1px solid rgba(0,200,255,0.15);
        border-radius: 10px;
        padding: 0.9rem 1rem;
      }

      .code-label {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.35rem;
      }

      .code {
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--text);
        word-break: break-all;
      }

      /* ── Steps ── */
      .steps {
        padding-left: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .steps li {
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.5;
      }

      .steps li strong {
        color: var(--text);
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      button {
        width: 100%;
        padding: 0.8rem 1rem;
        border-radius: 10px;
        border: none;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
      }

      button:active { transform: scale(0.98); }
      button:hover  { opacity: 0.88; }

      button.primary {
        background: var(--accent);
        color: #000;
      }

      button.enter {
        background: rgba(0,200,255,0.12);
        color: var(--accent);
        border: 1px solid rgba(0,200,255,0.25);
      }

      /* ── Footer note ── */
      .page-note {
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.55;
        text-align: center;
      }

      /* ── Utility ── */
      .hidden { display: none !important; }
    </style>
  </head>

  <body>
    <main class="card">

      <!-- Header + lang picker -->
      <div class="card-header">
        <div>
          <h1 data-i18n="pageTitle">Join Shoq Server</h1>
          <p id="subtitle" data-i18n="pageSubtitle">Invite Preview</p>
        </div>
        <!-- Language switcher — built by shoq-i18n.js -->
        <div id="lang-picker"></div>
      </div>

      <!-- Server preview (shown when loaded via JS) -->
      <section id="serverSection" class="server-card hidden">
        <img id="serverAvatar" class="server-avatar hidden" alt="Server Avatar" />
        <div>
          <div class="server-name" id="serverName">—</div>
          <div class="server-sub" id="serverMemberCount">—</div>
          <div class="server-desc hidden" id="serverDescription"></div>
        </div>
      </section>

      <!-- Invite code -->
      <section id="codeSection" class="code-wrap hidden">
        <div class="code-label" data-i18n="inviteCode">Invite Code</div>
        <div class="code" id="displayCode">—</div>
      </section>

      <!-- Steps -->
      <ol class="steps">
        <li data-i18n="inviteStep1">Open Shoq.</li>
        <li data-i18n="inviteStep2">Tap Join Server.</li>
        <li data-i18n="inviteStep3">Paste the invite code and confirm.</li>
      </ol>

      <!-- CTA buttons -->
      <div class="actions">
        <button class="primary" id="openInShoqBtn" data-i18n="openInShoq">Open in Shoq</button>
        <button class="enter" id="copyCodeBtn" data-i18n="copyCode">Copy Code</button>
      </div>

      <!-- Footer note -->
      <p class="page-note" data-i18n="pageNote">
        This page is for invite links only. If direct opening doesn't work, copy the code and join manually in the app.
      </p>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

    <script>
      // Firebase initialization
      const firebaseConfig = {
        apiKey: "AIzaSyCxi5tfDUNbSrdMWfdaC1j84DTfTJBGbEc",
        authDomain: "shoq-bfa54.firebaseapp.com",
        projectId: "shoq-bfa54",
        storageBucket: "shoq-bfa54.appspot.com",
        messagingSenderId: "377919689277",
        appId: "1:377919689277:web:69f6a06e6367e567f75054"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();

      function normalizeInviteCode(code) {
        return (code || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
      }

      function resolveInviteCode(url) {
        const keys = ['joinServer', 'code', 'invite', 'server'];
        for (const key of keys) {
          const value = url.searchParams.get(key);
          if (value && value.trim()) return value.trim();
        }
        const segments = url.pathname
          .split('/')
          .map((segment) => segment.trim())
          .filter(Boolean);
        const markers = new Set(['join-server', 'invite', 'join']);
        for (let i = 0; i < segments.length - 1; i += 1) {
          if (markers.has(segments[i].toLowerCase())) {
            return segments[i + 1];
          }
        }
        if (segments.length > 0) {
          const tail = segments[segments.length - 1];
          if (tail.length >= 6) return tail;
        }
        return '';
      }

      // Fetch server/conversation data
      async function fetchServerData(conversationId) {
        try {
          const docRef = db.collection('conversations').doc(conversationId);
          const docSnap = await docRef.get();
          
          if (!docSnap.exists) {
            console.warn('Conversation not found:', conversationId);
            return null;
          }

          const data = docSnap.data();
          return {
            name: data.name || data.title || 'Server',
            avatar: data.avatar || data.avatarUrl || null,
            participants: Array.isArray(data.participants) ? data.participants.length : 0,
            description: data.description || null
          };
        } catch (error) {
          console.error('Failed to fetch server data:', error);
          return null;
        }
      }

      async function fetchInviteServerData(code) {
        if (!code) return null;
        try {
          const inviteSnap = await db.collection('serverInvites').doc(code).get();
          if (!inviteSnap.exists) return null;
          const inviteData = inviteSnap.data() || {};
          const serverId = (inviteData.serverId || '').toString().trim();
          if (!serverId) return null;
          return await fetchServerData(serverId);
        } catch (error) {
          console.warn('Failed to fetch invite data:', error);
          return null;
        }
      }

      function applyServerPreview(serverData) {
        if (!serverData) return;
        const serverSection = document.getElementById('serverSection');
        const name = serverData.name || 'Server';
        const participants = Number.isFinite(serverData.participants)
          ? serverData.participants
          : null;
        const description = (serverData.description || '').toString().trim();
        document.getElementById('serverName').textContent = name;
        document.getElementById('serverMemberCount').textContent = participants == null
          ? 'Member count available in app'
          : `${participants} member${participants === 1 ? '' : 's'}`;

        if (serverData.avatar) {
          const img = document.getElementById('serverAvatar');
          img.src = serverData.avatar;
          img.classList.remove('hidden');
        }
        const descEl = document.getElementById('serverDescription');
        if (description) {
          descEl.textContent = description;
          descEl.classList.remove('hidden');
        }
        serverSection.classList.remove('hidden');
      }

      // Main initialization
      (() => {
        const url = new URL(window.location);
        const rawCode = resolveInviteCode(url);
        const code = normalizeInviteCode(rawCode);

        if (!code) {
          console.warn('No invite code in URL');
          document.getElementById('codeSection').classList.add('hidden');
          document.getElementById('openInShoqBtn').disabled = true;
          document.getElementById('copyCodeBtn').disabled = true;
          document.getElementById('openInShoqBtn').style.opacity = '0.5';
          document.getElementById('copyCodeBtn').style.opacity = '0.5';
          return;
        }

        // Show code section
        document.getElementById('codeSection').classList.remove('hidden');
        document.getElementById('displayCode').textContent = code;

        const serverName = url.searchParams.get('serverName');
        const serverAvatar = url.searchParams.get('serverAvatar');
        const serverDesc = url.searchParams.get('serverDesc');
        if ((serverName && serverName.trim()) || (serverAvatar && serverAvatar.trim())) {
          applyServerPreview({
            name: serverName,
            avatar: serverAvatar,
            description: serverDesc,
            participants: null,
          });
        }

        auth.signInAnonymously()
          .then(() => fetchInviteServerData(code))
          .then((serverData) => {
            if (serverData) {
              applyServerPreview(serverData);
            }
          })
          .catch((error) => {
            console.warn('Invite preview auth failed:', error);
          });

        // Open in Shoq (deep link)
        document.getElementById('openInShoqBtn').addEventListener('click', () => {
          const deepLink = `shoq://join-server?joinServer=${encodeURIComponent(code)}`;
          window.location.href = deepLink;

          // Fallback: if app doesn't open, copy code after a delay
          setTimeout(() => {
            navigator.clipboard.writeText(code).catch(() => {});
          }, 1000);
        });

        // Copy code to clipboard
        document.getElementById('copyCodeBtn').addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(code);
            const btn = document.getElementById('copyCodeBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
              btn.textContent = originalText;
            }, 2000);
          } catch (err) {
            console.error('Failed to copy:', err);
          }
        });
      })();
    </script>
  </body>
</html>
